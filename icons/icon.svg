<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded-square background matching iOS squircle proportions. -->
  <rect width="512" height="512" rx="112" ry="112" fill="#f97316"/>

  <!-- Content sits within a ~50% inner box so it matches the padding other
       dock/home-screen icons use. Faint arc ties the dots together as a
       "growing interval" visual. -->
  <path
    d="M 152 285 Q 240 173 328 285"
    stroke="#ffffff"
    stroke-width="12"
    fill="none"
    stroke-linecap="round"
    opacity="0.35"
  />

  <!-- Three progressively larger dots: short interval → long interval → longer.
       Symbolises the widening gaps in a spaced-repetition schedule. -->
  <circle cx="152" cy="285" r="22" fill="#ffffff"/>
  <circle cx="240" cy="209" r="36" fill="#ffffff"/>
  <circle cx="328" cy="285" r="53" fill="#ffffff"/>
</svg>
